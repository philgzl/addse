name: pytest

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v6
    - run: sudo apt-get update && sudo apt-get install -y espeak-ng  # for LPSMetric
    - run: uv run --frozen pytest tests/
